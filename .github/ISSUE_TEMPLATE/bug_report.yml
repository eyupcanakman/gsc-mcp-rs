name: Bug Report
description: Report a bug in gsc-mcp-rs
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure auth with...
        2. Run tool...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `gsc-mcp-rs --version`
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Docker
    validations:
      required: true
  - type: dropdown
    id: auth
    attributes:
      label: Auth Method
      options:
        - OAuth 2.0
        - Service Account
        - Not applicable
    validations:
      required: true
